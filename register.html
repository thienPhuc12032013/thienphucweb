<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Identity - Harker</title>
<style>
/* ==== RESET & FONT ==== */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Consolas', 'Courier New', monospace; }

/* ==== BODY & BACKGROUND ==== */
body {
    background-color: #0b0f14;
    /* Hình nền bo mạch điện tử mờ */
    background-image: 
        linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)),
        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=1600');
    background-size: cover;
    background-position: center;
    color: #00ff9c;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* ==== CONTAINER ==== */
.auth-container {
    background: rgba(15, 20, 26, 0.9); /* Bán trong suốt */
    backdrop-filter: blur(4px);
    padding: 40px 30px;
    border: 1px solid #00ff9c;
    box-shadow: 0 0 25px rgba(0, 255, 156, 0.2);
    width: 380px;
    text-align: center;
    position: relative;
}

/* Trang trí 4 góc */
.auth-container::before, .auth-container::after {
    content: '';
    position: absolute;
    width: 15px; height: 15px;
    border: 3px solid #00ff9c;
    transition: 0.3s;
}
.auth-container::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
.auth-container::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }

/* ==== HÌNH ẢNH ICON (MỚI) ==== */
.reg-icon {
    width: 70px;
    height: 70px;
    margin-bottom: 10px;
    /* Hiệu ứng phát sáng màu xanh */
    filter: drop-shadow(0 0 8px #00ff9c) brightness(1.5);
}

/* TITLE */
.auth-container h2 {
    margin-bottom: 5px;
    font-size: 24px;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(0, 255, 156, 0.5);
    text-transform: uppercase;
}

.sub-text {
    font-size: 11px;
    color: #888;
    margin-bottom: 25px;
    display: block;
    letter-spacing: 1px;
}

/* INPUT */
.input-group {
    margin-bottom: 15px;
    text-align: left;
}
.input-group label {
    font-size: 11px;
    color: #00ff9c;
    opacity: 0.9;
    font-weight: bold;
}

.auth-container input {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 0; 
    border: 1px solid #333;
    background: rgba(5, 7, 9, 0.8);
    color: #fff;
    font-size: 15px;
    transition: 0.3s;
    outline: none;
}
.auth-container input:focus {
    border-color: #00ff9c;
    box-shadow: 0 0 10px rgba(0, 255, 156, 0.3);
}

/* BUTTON */
.auth-container button {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    border: 1px solid #00ff9c;
    border-radius: 0;
    background: rgba(0, 255, 156, 0.1);
    color: #00ff9c;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    text-transform: uppercase;
    transition: 0.3s;
}
.auth-container button:hover {
    background: #00ff9c;
    color: #000;
    box-shadow: 0 0 20px #00ff9c;
}
.auth-container button:disabled {
    background: #222;
    border-color: #444;
    color: #666;
    cursor: not-allowed;
    box-shadow: none;
}

/* LINKS */
.auth-container p {
    margin-top: 20px;
    font-size: 13px;
    color: #888;
}
.auth-container a {
    color: #00ff9c;
    text-decoration: none;
    font-weight: bold;
}
.auth-container a:hover {
    text-decoration: underline;
    text-shadow: 0 0 5px #00ff9c;
}

/* MESSAGES */
#msgBox {
    margin-top: 15px;
    font-size: 12px;
    font-weight: bold;
    min-height: 18px;
}
.error { color: #ff5555; text-shadow: 0 0 5px #ff5555; }
.success { color: #00ff9c; text-shadow: 0 0 5px #00ff9c; }

</style>
</head>
<body>
<div class="auth-container">
    <!-- HÌNH ẢNH DẤU VÂN TAY / ID -->
    <img src="https://cdn-icons-png.flaticon.com/512/10629/10629607.png" alt="Fingerprint Identity" class="reg-icon">

    <h2>NEW IDENTITY</h2>
    <span class="sub-text">// CREATE USER PROFILE</span>

    <form id="registerForm">
        <div class="input-group">
            <label>USERNAME_</label>
            <input type="text" id="username" placeholder="Tên đăng nhập" required autocomplete="off">
        </div>
        
        <div class="input-group">
            <label>PASSWORD_</label>
            <input type="password" id="password" placeholder="Mật khẩu" required>
        </div>

        <div class="input-group">
            <label>CONFIRM PASSWORD_</label>
            <input type="password" id="confirmPassword" placeholder="Xác nhận mật khẩu" required>
        </div>

        <button type="submit" id="regBtn">[ INITIALIZE ]</button>
    </form>

    <div id="msgBox"></div>

    <p>Already have an ID? <a href="login.html">Login</a></p>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', function(e){
    e.preventDefault();
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const msgBox = document.getElementById('msgBox');
    const btn = document.getElementById('regBtn');

    // Reset thông báo
    msgBox.className = '';
    msgBox.textContent = '';

    // Kiểm tra mật khẩu
    if(password !== confirmPassword){
        msgBox.className = 'error';
        msgBox.textContent = "> ERROR: PASSWORD MISMATCH.";
        return;
    }

    if(password.length < 6) {
        msgBox.className = 'error';
        msgBox.textContent = "> ERROR: PASSWORD TOO WEAK (MIN 6 CHARS).";
        return;
    }

    // Hiệu ứng đang xử lý
    btn.textContent = "PROCESSING...";
    btn.disabled = true;

    // Giả lập delay mạng 1 giây
    setTimeout(() => {
        // Lấy dữ liệu cũ từ LocalStorage
        let users = JSON.parse(localStorage.getItem('users') || "[]");
        
        // Kiểm tra trùng tên
        if(users.find(u => u.username === username)){
            msgBox.className = 'error';
            msgBox.textContent = "> ERROR: USERNAME ALREADY EXISTS.";
            btn.textContent = "[ INITIALIZE ]";
            btn.disabled = false;
            return;
        }

        // Lưu user mới
        users.push({username, password});
        localStorage.setItem('users', JSON.stringify(users));

        // Thông báo thành công
        msgBox.className = 'success';
        msgBox.textContent = "> SUCCESS: IDENTITY CREATED.";
        
        // Chuyển hướng về trang đăng nhập
        setTimeout(() => {
            window.location.href = "login.html";
        }, 1500);

    }, 1000);
});
</script>
</body>
</html>
